apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-probe-demo
  namespace: probe-lab
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-probe-demo
  template:
    metadata:
      labels:
        app: nginx-probe-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27.5
          ports:
            - containerPort: 80
          command:
            - /bin/sh
            - -c
            - |
              POD_NAME="$(hostname)"
              echo "<html><body><h1>${POD_NAME}</h1></body></html>" > /usr/share/nginx/html/index.html
              touch /tmp/ready
              nginx -g 'daemon off;'
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - test -f /tmp/ready
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 1