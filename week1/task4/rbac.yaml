apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-reader-sa
  namespace: sa-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-reader-role
  namespace: probe-lab
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-reader-rolebinding
  namespace: probe-lab
subjects:
  - kind: ServiceAccount
    name: pod-reader-sa
    namespace: sa-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: pod-reader-role
