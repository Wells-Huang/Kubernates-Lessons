apiVersion: apps/v1
kind: Deployment
metadata:
  name: task6-web
  namespace: week2-task6
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task6-web
  template:
    metadata:
      labels:
        app: task6-web
    spec:
      containers:
        - name: web
          image: task6-web:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: redis-auth
          env:
            - name: REDIS_CLUSTER_SERVICE
              value: redis.week2-task6.svc.cluster.local
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
