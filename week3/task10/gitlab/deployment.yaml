apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: gitlab
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
        - name: gitlab
          image: gitlab/gitlab-ce:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
            - containerPort: 22
              name: ssh
          env:
            - name: GITLAB_ROOT_PASSWORD
              value: Passw0rd!
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://127.0.0.1:30080'
                letsencrypt['enable'] = false
                nginx['listen_port'] = 80
                nginx['listen_https'] = false
                puma['worker_processes'] = 0
                sidekiq['max_concurrency'] = 10
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "2000m"
              memory: "6Gi"
          volumeMounts:
            - name: gitlab-data
              mountPath: /etc/gitlab
              subPath: etc-gitlab
            - name: gitlab-data
              mountPath: /var/log/gitlab
              subPath: log-gitlab
            - name: gitlab-data
              mountPath: /var/opt/gitlab
              subPath: opt-gitlab
      volumes:
        - name: gitlab-data
          persistentVolumeClaim:
            claimName: gitlab-data
