apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task10-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://host.minikube.internal:18080/root/task10-gitops.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
