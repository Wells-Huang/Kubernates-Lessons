apiVersion: v1
kind: Service
metadata:
  name: {{ include "task6-platform.nginxServiceName" . }}
  labels:
    {{- include "task6-platform.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "task6-platform.nginxServiceName" . }}
  ports:
    - name: http
      port: {{ .Values.nginx.service.port }}
      targetPort: 80
