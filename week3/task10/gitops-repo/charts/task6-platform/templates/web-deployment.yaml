apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "task6-platform.webServiceName" . }}
  labels:
    {{- include "task6-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "task6-platform.webServiceName" . }}
  template:
    metadata:
      labels:
        app: {{ include "task6-platform.webServiceName" . }}
        {{- include "task6-platform.labels" . | nindent 8 }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.service.targetPort }}
          envFrom:
            - secretRef:
                name: {{ include "task6-platform.redisAuthSecretName" . }}
          env:
            - name: REDIS_CLUSTER_SERVICE
              value: {{ include "task6-platform.redisClusterServiceHost" . | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.web.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
