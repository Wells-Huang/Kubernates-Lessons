apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-demo-sa
  namespace: week3-task11
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-csi-demo
  namespace: week3-task11
spec:
  provider: vault
  secretObjects:
    - secretName: csi-demo-secret
      type: Opaque
      data:
        - objectName: csi-username
          key: username
        - objectName: csi-password
          key: password
        - objectName: csi-message
          key: message
  parameters:
    roleName: csi-demo
    vaultAddress: http://vault.vault.svc.cluster.local:8200
    objects: |
      - objectName: "csi-username"
        secretPath: "secret/data/week3-task11/csi"
        secretKey: "username"
      - objectName: "csi-password"
        secretPath: "secret/data/week3-task11/csi"
        secretKey: "password"
      - objectName: "csi-message"
        secretPath: "secret/data/week3-task11/csi"
        secretKey: "message"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: csi-demo
  namespace: week3-task11
  annotations:
    # The synced secret is produced by the CSI driver, so we watch it explicitly.
    secret.reloader.stakater.com/reload: "csi-demo-secret"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csi-demo
  template:
    metadata:
      labels:
        app: csi-demo
    spec:
      serviceAccountName: csi-demo-sa
      containers:
        - name: app
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
          args:
            - |
              echo "CSI demo started";
              echo "mounted username=$(cat /mnt/secrets-store/csi-username)";
              echo "mounted message=$(cat /mnt/secrets-store/csi-message)";
              echo "synced env message=${SYNCED_MESSAGE:-missing}";
              while true; do
                echo "---";
                date;
                echo "mounted username=$(cat /mnt/secrets-store/csi-username)";
                echo "mounted message=$(cat /mnt/secrets-store/csi-message)";
                echo "synced env message=${SYNCED_MESSAGE:-missing}";
                sleep 20;
              done
          env:
            - name: SYNCED_MESSAGE
              valueFrom:
                secretKeyRef:
                  name: csi-demo-secret
                  key: message
                  optional: true
          volumeMounts:
            - name: secrets-store-inline
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: vault-csi-demo
